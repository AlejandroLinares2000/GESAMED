<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESAMED 2000 — Dashboard Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg0:#0b0f1a;--bg1:#111827;--card:rgba(17,24,39,.72);--stroke:rgba(100,116,160,.18);--text:#eaf0ff;--muted:rgba(165,180,210,.54);--radius:16px;--radius2:10px}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;background:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(56,90,160,.22) 0%,transparent 60%),linear-gradient(175deg,var(--bg0) 0%,#10162a 100%)}
        header{position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);background:rgba(11,15,26,.78);border-bottom:1px solid var(--stroke);padding:1.1rem;text-align:center}
        header h1{font-size:1.5rem;font-weight:800;color:#f0f4ff}
        .container{max-width:1400px;margin:0 auto;padding:1.5rem}
        .filters{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem;display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:1rem}
        .filters select, .filters input{background:var(--bg1);border:1px solid var(--stroke);color:var(--text);padding:.5rem;border-radius:var(--radius2);outline:none}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem;margin-bottom:1.5rem}
        .kpi-card{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1.2rem;position:relative}
        .kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#3b82f6}
        .kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;font-weight:700}
        .kpi-value{font-size:1.6rem;font-weight:800;margin-top:5px}
        .data-table{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1rem;overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:.78rem}
        th{text-align:left;color:var(--muted);padding:10px;border-bottom:1px solid var(--stroke);text-transform:uppercase;font-size:0.65rem}
        td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .text-right{text-align:right}
        .badge{padding:4px 10px;border-radius:6px;font-size:0.65rem;font-weight:800;text-transform:uppercase;display:inline-block}
        .est-cobrado{background:#22c55e; color:#fff} 
        .est-parcial{background:#ec4899; color:#fff}
        .est-sin-respuesta{background:#f59e0b; color:#fff}
        .est-pendiente{background:#3b82f6; color:#fff}
    </style>
</head>
<body>

<header>
    <h1>GESAMED 2000 — Dashboard Operativo</h1>
    <p id="status" style="font-size:0.8rem; color:var(--muted)">Procesando datos de Google Sheets...</p>
</header>

<div class="container">
    <div class="filters">
        <select id="fAseg"><option value="">Aseguradora (Todas)</option></select>
        <select id="fAbog"><option value="">Abogado (Todos)</option></select>
        <select id="fEst"><option value="">Estado (Filtrar por cálculo)</option>
            <option value="COBRADO">COBRADO</option>
            <option value="PAGO PARCIAL">PAGO PARCIAL</option>
            <option value="SIN RESPUESTA">SIN RESPUESTA</option>
        </select>
        <input type="date" id="fDesde">
        <input type="date" id="fHasta">
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Expedientes</div><div class="kpi-value" id="kExp">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Facturado</div><div class="kpi-value" id="kFact">0 €</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Cobrado</div><div class="kpi-value" id="kCob">0 €</div></div>
        <div class="kpi-card"><div class="kpi-label">Pendiente Real</div><div class="kpi-value" id="kPend" style="color:#ef4444">0 €</div></div>
    </div>

    <div class="data-table">
        <table>
            <thead>
                <tr>
                    <th>Abogado</th>
                    <th>Nº Exp</th>
                    <th>Fecha</th>
                    <th>Aseguradora</th>
                    <th class="text-right">Facturado (D)</th>
                    <th class="text-right">Cobrado (H+I)</th>
                    <th>Estado Calc.</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD4xAY-smgan-fPLVb11yhV4QsQiKuJ8bnVyUrnJuNXuw6Sis3THNWL5Jg26M6qZM03GzIkkJcwKYA/pub?gid=2126248190&single=true&output=csv';

let rawData = [];

function parseNum(v) {
    if(!v || v.trim() === "" || v === "-") return 0;
    // Eliminar símbolos de moneda y espacios, corregir formato decimal español
    let clean = v.toString().replace(/[€\s]/g, '').replace(/\./g, '').replace(',', '.');
    let n = parseFloat(clean);
    return isNaN(n) ? 0 : n;
}

function calcularEstado(fact, cob) {
    if (cob >= fact && fact > 0) return { label: 'COBRADO', class: 'est-cobrado' };
    if (cob > 0 && cob < fact) return { label: 'PAGO PARCIAL', class: 'est-parcial' };
    return { label: 'SIN RESPUESTA', class: 'est-sin-respuesta' };
}

async function init() {
    try {
        const resp = await fetch(CSV_URL);
        const text = await resp.text();
        const lines = text.split('\n');
        
        rawData = lines.slice(1).map(line => {
            const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/"/g, '').trim());
            if(c.length < 11) return null;

            const fact = parseNum(c[3]); // Col D
            const cob = parseNum(c[7]) + parseNum(c[8]); // Col H + I
            const est = calcularEstado(fact, cob);

            return {
                abog: c[0] || 'N/D',      // Col A
                exp: c[1] || 'S/N',       // Col B
                fecha: c[4] || '',        // Col E
                aseg: c[10] || 'N/D',     // Col K
                fact: fact,
                cob: cob,
                estLabel: est.label,
                estClass: est.class
            };
        }).filter(x => x !== null && x.exp !== 'S/N');

        const fill = (id, prop) => {
            const sel = document.getElementById(id);
            const vals = [...new Set(rawData.map(x => x[prop]))].filter(v => v && v !== 'N/D').sort();
            vals.forEach(v => sel.add(new Option(v, v)));
        };
        fill('fAseg', 'aseg'); fill('fAbog', 'abog');

        render();
        document.getElementById('status').innerText = 'Sincronización OK';
    } catch (e) {
        document.getElementById('status').innerText = 'Error de datos';
    }
}

function render() {
    const fA = document.getElementById('fAseg').value;
    const fB = document.getElementById('fAbog').value;
    const fE = document.getElementById('fEst').value;
    const fD = document.getElementById('fDesde').value;
    const fH = document.getElementById('fHasta').value;

    const filtered = rawData.filter(d => {
        return (!fA || d.aseg === fA) && 
               (!fB || d.abog === fB) && 
               (!fE || d.estLabel === fE) &&
               (!fD || d.fecha >= fD) && 
               (!fH || d.fecha <= fH);
    });

    const tF = filtered.reduce((s, d) => s + d.fact, 0);
    const tC = filtered.reduce((s, d) => s + d.cob, 0);

    document.getElementById('kExp').innerText = filtered.length;
    document.getElementById('kFact').innerText = tF.toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';
    document.getElementById('kCob').innerText = tC.toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';
    document.getElementById('kPend').innerText = (tF - tC).toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';

    document.getElementById('tBody').innerHTML = filtered.map(d => `
        <tr>
            <td>${d.abog}</td>
            <td><b>${d.exp}</b></td>
            <td>${d.fecha}</td>
            <td>${d.aseg}</td>
            <td class="text-right">${d.fact.toLocaleString('es-ES', {minimumFractionDigits:2})} €</td>
            <td class="text-right">${d.cob.toLocaleString('es-ES', {minimumFractionDigits:2})} €</td>
            <td><span class="badge ${d.estClass}">${d.estLabel}</span></td>
        </tr>
    `).join('');
}

document.querySelectorAll('select, input').forEach(el => el.onchange = render);
init();
</script>
</body>
</html>
