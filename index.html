<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESAMED 2000 — Dashboard Financiero</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg0:#0b0f1a;--bg1:#111827;--card:rgba(17,24,39,.72);--stroke:rgba(100,116,160,.18);--text:#eaf0ff;--muted:rgba(165,180,210,.54);--radius:16px;--radius2:10px}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;background:radial-gradient(ellipse 120% 60% at 50% -10%,rgba(56,90,160,.22) 0%,transparent 60%),linear-gradient(175deg,var(--bg0) 0%,#10162a 100%)}
        header{position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);background:rgba(11,15,26,.78);border-bottom:1px solid var(--stroke);padding:1.1rem;text-align:center}
        header h1{font-size:1.5rem;font-weight:800;color:#f0f4ff}
        .container{max-width:1400px;margin:0 auto;padding:1.5rem}
        .filters{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1rem;margin-bottom:1.5rem;display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:1rem}
        .filters select, .filters input{background:var(--bg1);border:1px solid var(--stroke);color:var(--text);padding:.5rem;border-radius:var(--radius2);outline:none}
        .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem;margin-bottom:1.5rem}
        .kpi-card{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1.2rem;position:relative;overflow:hidden}
        .kpi-card::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#3b82f6}
        .kpi-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;font-weight:700}
        .kpi-value{font-size:1.6rem;font-weight:800;margin-top:5px}
        .charts-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:1.5rem;margin-bottom:1.5rem}
        .chart-box{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1.2rem;height:350px}
        .data-table{background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);padding:1rem;overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:.85rem}
        th{text-align:left;color:var(--muted);padding:10px;border-bottom:1px solid var(--stroke);text-transform:uppercase;font-size:0.7rem}
        td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .text-right{text-align:right}
        .badge{padding:3px 8px;border-radius:5px;font-size:0.7rem;font-weight:700;background:rgba(255,255,255,0.1)}
    </style>
</head>
<body>

<header>
    <h1>GESAMED 2000 — Dashboard Inteligente</h1>
    <p id="status" style="font-size:0.8rem; color:var(--muted)">Sincronizando con Google Sheets...</p>
</header>

<div class="container">
    <div class="filters">
        <select id="fAseg"><option value="">Aseguradora (Todas)</option></select>
        <select id="fAbog"><option value="">Abogado (Todos)</option></select>
        <select id="fEst"><option value="">Estado (Todos)</option></select>
        <input type="date" id="fDesde">
        <input type="date" id="fHasta">
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Expedientes</div><div class="kpi-value" id="kExp">0</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Facturado</div><div class="kpi-value" id="kFact">0 €</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Cobrado</div><div class="kpi-value" id="kCob">0 €</div></div>
        <div class="kpi-card"><div class="kpi-label">Pendiente Cobro</div><div class="kpi-value" id="kPend" style="color:#ef4444">0 €</div></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box"><canvas id="cEst"></canvas></div>
        <div class="chart-box"><canvas id="cAseg"></canvas></div>
    </div>

    <div class="data-table">
        <table>
            <thead>
                <tr>
                    <th>Nº Exp.</th>
                    <th>Fecha</th>
                    <th>Aseguradora</th>
                    <th>Abogado</th>
                    <th class="text-right">Facturado</th>
                    <th class="text-right">Cobrado</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD4xAY-smgan-fPLVb11yhV4QsQiKuJ8bnVyUrnJuNXuw6Sis3THNWL5Jg26M6qZM03GzIkkJcwKYA/pub?gid=2126248190&single=true&output=csv';

let rawData = [];
let charts = {};

// Procesa números en formato español (1.250,50)
function parseNum(v) {
    if(!v) return 0;
    let n = v.toString().replace(/\./g, '').replace(',', '.');
    return parseFloat(n) || 0;
}

async function init() {
    try {
        const resp = await fetch(CSV_URL);
        const text = await resp.text();
        const lines = text.split('\n');
        
        // Detectar índices de columnas automáticamente por nombre
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toUpperCase());
        
        const idx = {
            exp: headers.findIndex(h => h.includes('EXPEDIENTE') || h.includes('Nº')),
            fecha: headers.findIndex(h => h.includes('FECHA')),
            aseg: headers.findIndex(h => h.includes('ASEGURADORA')),
            abog: headers.findIndex(h => h.includes('ABOGADO')),
            fact: headers.findIndex(h => h.includes('FACTURADO')),
            cob: headers.findIndex(h => h.includes('COBRADO')),
            est: headers.findIndex(h => h.includes('ESTADO'))
        };

        rawData = lines.slice(1).map(line => {
            const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/"/g, '').trim());
            if(c.length < 5) return null;
            return {
                exp: c[idx.exp] || 'S/N',
                fecha: c[idx.fecha] || '',
                aseg: c[idx.aseg] || 'Sin Aseguradora',
                abog: c[idx.abog] || 'Sin Abogado',
                fact: parseNum(c[idx.fact]),
                cob: parseNum(c[idx.cob]),
                est: (c[idx.est] || 'PTE').toUpperCase()
            };
        }).filter(x => x !== null);

        // Rellenar selectores dinámicamente
        const fill = (id, prop) => {
            const sel = document.getElementById(id);
            [...new Set(rawData.map(x => x[prop]))].sort().forEach(v => {
                if(v) sel.add(new Option(v, v));
            });
        };
        fill('fAseg', 'aseg'); fill('fAbog', 'abog'); fill('fEst', 'est');

        render();
        document.getElementById('status').innerText = 'Sincronización completa';
    } catch (e) {
        document.getElementById('status').innerText = 'Error en la coincidencia de columnas';
        console.error(e);
    }
}

function render() {
    const fA = document.getElementById('fAseg').value;
    const fB = document.getElementById('fAbog').value;
    const fE = document.getElementById('fEst').value;
    const fD = document.getElementById('fDesde').value;
    const fH = document.getElementById('fHasta').value;

    const filtered = rawData.filter(d => {
        const matchAseg = !fA || d.aseg === fA;
        const matchAbog = !fB || d.abog === fB;
        const matchEst = !fE || d.est === fE;
        const matchDesde = !fD || d.fecha >= fD;
        const matchHasta = !fH || d.fecha <= fH;
        return matchAseg && matchAbog && matchEst && matchDesde && matchHasta;
    });

    const tFact = filtered.reduce((s, d) => s + d.fact, 0);
    const tCob = filtered.reduce((s, d) => s + d.cob, 0);

    document.getElementById('kExp').innerText = filtered.length;
    document.getElementById('kFact').innerText = tFact.toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';
    document.getElementById('kCob').innerText = tCob.toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';
    document.getElementById('kPend').innerText = (tFact - tCob).toLocaleString('es-ES', {minimumFractionDigits:2}) + ' €';

    document.getElementById('tBody').innerHTML = filtered.slice(0, 50).map(d => `
        <tr>
            <td><b>${d.exp}</b></td>
            <td>${d.fecha}</td>
            <td>${d.aseg}</td>
            <td>${d.abog}</td>
            <td class="text-right">${d.fact.toLocaleString('es-ES', {minimumFractionDigits:2})} €</td>
            <td class="text-right">${d.cob.toLocaleString('es-ES', {minimumFractionDigits:2})} €</td>
            <td><span class="badge">${d.est}</span></td>
        </tr>
    `).join('');

    updateCharts(filtered);
}

function updateCharts(data) {
    // Gráfico de Estados
    const estCount = data.reduce((a, c) => (a[c.est] = (a[c.est] || 0) + 1, a), {});
    if(charts.est) charts.est.destroy();
    charts.est = new Chart(document.getElementById('cEst').getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: Object.keys(estCount),
            datasets: [{ data: Object.values(estCount), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#a855f7'] }]
        },
        options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff' } }, title: {display:true, text:'EXPEDIENTES POR ESTADO', color:'#fff'} } }
    });

    // Gráfico de Aseguradoras (Top 5)
    const asegFact = data.reduce((a, c) => (a[c.aseg] = (a[c.aseg] || 0) + c.fact, a), {});
    const sortedAseg = Object.entries(asegFact).sort((a,b) => b[1]-a[1]).slice(0, 5);
    if(charts.aseg) charts.aseg.destroy();
    charts.aseg = new Chart(document.getElementById('cAseg').getContext('2d'), {
        type: 'bar',
        data: {
            labels: sortedAseg.map(x => x[0]),
            datasets: [{ label: 'Facturado (€)', data: sortedAseg.map(x => x[1]), backgroundColor: '#3b82f6' }]
        },
        options: { maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display:false }, title: {display:true, text:'TOP 5 ASEGURADORAS', color:'#fff'} }, scales: { x: { ticks: {color:'#fff'} }, y: { ticks: {color:'#fff'} } } }
    });
}

document.querySelectorAll('select, input').forEach(el => el.onchange = render);
init();
</script>
</body>
</html>
</body>
</html>
